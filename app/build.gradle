buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

apply plugin: 'com.android.application'

repositories {
    google()
    mavenCentral()
}

android {
    namespace 'com.example.ytshortcut'
    compileSdk 34
    
    defaultConfig {
        applicationId "com.example.ytshortcut"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
